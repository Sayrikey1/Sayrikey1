name: Update Daily Quote

on:
  schedule:
    - cron: "0 6 * * *" # Runs daily at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate random quote
        run: |
          # Read quotes file and pick a random quote
          QUOTE=$(python3 -c "
          import json, random
          with open('quotes/quotes.json', 'r') as f:
              data = json.load(f)
          quote = random.choice(data['quotes'])
          print(f'> *\"{quote[\"text\"]}\"*')
          print(f'> ')
          print(f'> — **{quote[\"author\"]}**')
          ")

          # Update README between markers
          python3 -c "
          import re

          with open('README.md', 'r') as f:
              content = f.read()

          new_quote = '''$QUOTE'''

          pattern = r'(<!--QUOTE:START-->).*?(<!--QUOTE:END-->)'
          replacement = f'<!--QUOTE:START-->\n{new_quote}\n<!--QUOTE:END-->'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "📜 Update daily quote" && git push)
